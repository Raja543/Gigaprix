name: Sync races

# Near-real-time race resolution without Vercel Pro. GitHub Actions' minimum
# schedule is ~5 minutes (and may be delayed under load) — good enough as a
# free alternative; the in-app "Fetch result" button always works instantly.
#
# Setup: add two repo secrets (Settings → Secrets and variables → Actions):
#   SYNC_URL    = https://<your-app>.vercel.app/api/cron/sync-races
#   CRON_SECRET = (same value as the CRON_SECRET env var on Vercel)

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger race sync
        run: |
          if [ -z "${{ secrets.SYNC_URL }}" ]; then
            echo "SYNC_URL secret not set — skipping."; exit 0
          fi
          curl -fsS -X POST "${{ secrets.SYNC_URL }}" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            && echo "" || echo "sync request failed (non-fatal)"
